<!DOCTYPE html>
<html>
<head>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:675px;background:#0a0a0a;font-family:-apple-system,'Hiragino Sans',sans-serif;display:flex;flex-direction:column;align-items:center;padding:30px}
  h1{color:white;font-size:28px;margin-bottom:8px;font-weight:800}
  p.sub{color:#6b7280;font-size:14px;margin-bottom:24px}
  .cards{display:flex;gap:20px;justify-content:center}
  .card{width:340px;background:#111;border:1px solid #1f2937;border-radius:16px;padding:24px;position:relative}
  .level{position:absolute;top:-12px;left:50%;transform:translateX(-50%);padding:4px 16px;border-radius:20px;font-size:12px;font-weight:700;color:white}
  .level-ok{background:#059669}
  .level-warn{background:#d97706}
  .level-danger{background:#dc2626}
  .face{text-align:center;font-size:36px;margin:16px 0 8px}
  .score-label{color:#9ca3af;font-size:12px}
  .score{font-size:48px;font-weight:700;font-family:monospace;text-align:center}
  .score-ok{color:#34d399}
  .score-warn{color:#fbbf24}
  .score-danger{color:#f87171}
  .bar{background:#1f2937;border-radius:4px;height:8px;margin:8px 0 16px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .stat{background:#0a0a0a;border-radius:8px;padding:8px}
  .stat-label{color:#6b7280;font-size:9px}
  .stat-value{color:white;font-size:16px;font-weight:700;font-family:monospace}
  .rec{color:#9ca3af;font-size:11px;margin-top:12px;text-align:center;min-height:32px}
  .footer{color:#374151;font-size:11px;margin-top:20px;font-family:monospace}
</style>
</head>
<body>
  <h1>あなたの疲労度はどのレベル？</h1>
  <p class="sub">カメラ5秒で測定 → joemekw-code.github.io/tsukaremiru</p>
  <div class="cards">
    <div class="card">
      <div class="level level-ok">元気</div>
      <div class="face">(^_^)</div>
      <div class="score-label">疲労度</div>
      <div class="score score-ok">18<span style="font-size:20px;color:#4b5563">/100</span></div>
      <div class="bar"><div class="bar-fill" style="width:18%;background:#34d399"></div></div>
      <div class="stats">
        <div class="stat"><div class="stat-label">推定睡眠</div><div class="stat-value">7.2h</div></div>
        <div class="stat"><div class="stat-label">KSS</div><div class="stat-value">2.4/9</div></div>
        <div class="stat"><div class="stat-label">クマ度</div><div class="stat-value">12%</div></div>
        <div class="stat"><div class="stat-label">寝るべき度</div><div class="stat-value">8</div></div>
      </div>
      <div class="rec">このまま続けてOK</div>
    </div>
    <div class="card">
      <div class="level level-warn">注意</div>
      <div class="face">(-_-)</div>
      <div class="score-label">疲労度</div>
      <div class="score score-warn">52<span style="font-size:20px;color:#4b5563">/100</span></div>
      <div class="bar"><div class="bar-fill" style="width:52%;background:#fbbf24"></div></div>
      <div class="stats">
        <div class="stat"><div class="stat-label">推定睡眠</div><div class="stat-value">3.8h</div></div>
        <div class="stat"><div class="stat-label">KSS</div><div class="stat-value">5.2/9</div></div>
        <div class="stat"><div class="stat-label">クマ度</div><div class="stat-value">58%</div></div>
        <div class="stat"><div class="stat-label">寝るべき度</div><div class="stat-value">55</div></div>
      </div>
      <div class="rec">30分以内に休憩を</div>
    </div>
    <div class="card">
      <div class="level level-danger">危険</div>
      <div class="face">(=_=) zzZ</div>
      <div class="score-label">疲労度</div>
      <div class="score score-danger">73<span style="font-size:20px;color:#4b5563">/100</span></div>
      <div class="bar"><div class="bar-fill" style="width:73%;background:#ef4444"></div></div>
      <div class="stats">
        <div class="stat"><div class="stat-label">推定睡眠</div><div class="stat-value">1.8h</div></div>
        <div class="stat"><div class="stat-label">KSS</div><div class="stat-value">7.9/9</div></div>
        <div class="stat"><div class="stat-label">クマ度</div><div class="stat-value">99%</div></div>
        <div class="stat"><div class="stat-label">寝るべき度</div><div class="stat-value">72</div></div>
      </div>
      <div class="rec" style="color:#f87171">今すぐ寝ろ</div>
    </div>
  </div>
  <div class="footer">tsukaremiru - 顔は嘘をつかない</div>
</body>
</html>
